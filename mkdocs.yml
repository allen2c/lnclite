site_name: lnclite
site_description: Small async LanceDB document store for OpenAI-compatible embeddings.
site_url: https://allen2c.github.io/lnclite/
repo_url: https://github.com/allen2c/lnclite
repo_name: allen2c/lnclite

exclude_docs: |
  superpowers/**

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - Basic Usage: usage/basic.md
      - Tags: usage/tags.md
      - Indexing: usage/indexing.md
      - Directory Ingest: usage/ingest-directory.md
      - Managing Multiple Stores: usage/manager.md
  - API Reference: api-reference.md
  - Release: release.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true
